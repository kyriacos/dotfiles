set -g default-terminal "tmux-256color"
set-option -as terminal-features ',*:RGB'
# set-option -as terminal-overrides ',*:Tc'
set-option -ga terminal-overrides ',*:Tc'

# Start index at 1
set -g base-index 1

set -g mouse on
set -g history-limit 100000

# renumber windows when one is deleted
set-option -g renumber-windows on

#bind -n C-k clear-history
bind-key -n C-l send-keys C-l \; send-keys -R \; clear-history

# used https://thevaluable.dev/tmux-config-mouseless/ for config
# RELOAD CONFIG
unbind r
bind r source-file -F ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'laktak/extrakto'

# UI theme — managed by bin/theme (see theme/active.env)

set -g allow-rename off
set -g automatic-rename off

#########################################################
# PANE LABELING (pane borders only; window names are manual)
#
# Each pane shows git · branch, process, or cwd on the bottom border.
# Colors: theme/generated/tmux-panes.conf (bin/theme).
#
# Scripts: ~/.tmux/bin/   Docs: ~/.tmux/README
# Zsh hooks: ~/.tmux/zsh/pane-label.plugin.zsh
#
# prefix+, or `twname my-label` — rename the window manually
#########################################################

set-hook -g after-select-pane 'run-shell "$HOME/.tmux/bin/auto-label"'
set-hook -g after-select-window 'run-shell "$HOME/.tmux/bin/auto-label"'
set-hook -g after-split-window 'run-shell "$HOME/.tmux/bin/auto-label"'

unbind ,
bind , command-prompt -p 'window name>' -I '#{window_name}' 'rename-window "%%"'


#########################################################
# TMUX Yank and copy/paste improvements
#########################################################
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection_mouse 'clipboard'

set -g @yank_action 'copy-pipe-no-clear' # keep selection instead of exiting when selecting with a mouse
bind -T copy-mode    C-c send -X copy-pipe-no-clear "xsel -i --clipboard"
bind -T copy-mode-vi C-c send -X copy-pipe-no-clear "xsel -i --clipboard"

# These bindings are for X Windows only. If you're using a different
# window system you have to replace the `xsel` commands with something
# else. See https://github.com/tmux/tmux/wiki/Clipboard#available-tools
# https://www.seanh.cc/2020/12/27/copy-and-paste-in-tmux/
# Double click or triple click to select
bind -T copy-mode    DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-no-clear "xsel -i"
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-no-clear "xsel -i"
bind -n DoubleClick1Pane select-pane \; copy-mode -M \; send -X select-word \; send -X copy-pipe-no-clear "xsel -i"
bind -T copy-mode    TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-no-clear "xsel -i"
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-no-clear "xsel -i"
bind -n TripleClick1Pane select-pane \; copy-mode -M \; send -X select-line \; send -X copy-pipe-no-clear "xsel -i"
# Middle click mouse to paste
bind -n MouseDown2Pane run "tmux set-buffer -b primary_selection \"$(xsel -o)\"; tmux paste-buffer -b primary_selection; tmux delete-buffer -b primary_selection"

##########################################################
# -- END
##########################################################

#########################################################
# Creating window splits - shortcuts
#########################################################
# v and h are not bound by default, but we never know in the next versions...
unbind v
unbind h

unbind % # Split vertically
unbind '"' # Split horizontally

# open new split window in same directory as current one
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# open new window in same directory as current one
unbind c
bind c new-window -c "#{pane_current_path}"

##########################################################
# -- END
##########################################################


#########################################################
# VIM mode config
#########################################################
set -g status-keys vi
setw -g mode-keys vi
set-window-option -g mode-keys vi

# default key binding when in vim - unbind those
unbind -T copy-mode-vi Space; #Default for begin-selection
unbind -T copy-mode-vi Enter; #Default for copy-selection

# use v and y instead
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xsel --clipboard"
# if you prefer xclip instead of xsel
#bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard"`

##########################################################
# -- END
##########################################################

# Theme + plugins (order matters)
source-file -F ~/.dotfiles/theme/generated/tmux.conf
run '~/.tmux/plugins/tpm/tpm'

# Append zoom indicator after the active theme sets window format
set -wga window-status-current-format "#{?window_zoomed_flag, [Z],}"

source-file -F ~/.dotfiles/theme/generated/tmux-panes.conf
