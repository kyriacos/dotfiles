# Generated by bin/theme — pane labels for rose-pine/main
set-window-option -g pane-border-status bottom
set-window-option -g pane-border-lines heavy
set-window-option -g pane-border-format '#{?pane_active,#[fg=#f6c177]#[bold],#[fg=#6e6a86]}#{pane_title}'

set -g pane-border-style "fg=#524f67"
set -g pane-active-border-style "fg=#f6c177"

setw -g window-style "fg=#6e6a86,bg=#1f1d2e"
setw -g window-active-style "fg=#e0def4,bg=#191724"

set -g message-command-style "fg=#191724,bg=#f6c177,fill=#f6c177,width=100%"
set -g message-style "fg=#6e6a86,bg=#191724,fill=#191724,width=100%"
