# Generated by bin/theme — catppuccin/macchiato + simple status
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_flags "none"
set -g @catppuccin_window_text "#T"
set -g @catppuccin_window_current_text "#T"
run '/Users/kyriacos/.tmux/plugins/catppuccin-tmux/catppuccin.tmux'

set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right '#[fg=#{@thm_crust},bg=#{@thm_teal}] session: #S '
